version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: finemo-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  app:
    build: .
    container_name: finemo-app
    ports:
      - "8501:8501"
    depends_on:
      - ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    volumes:
      - ./finemo.db:/app/finemo.db
    restart: unless-stopped

volumes:
  ollama_data: